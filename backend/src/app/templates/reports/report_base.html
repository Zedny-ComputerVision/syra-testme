<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ report_title|e }}</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      color: #1f2937;
    }
    h1 {
      margin-bottom: 8px;
    }
    .meta {
      color: #6b7280;
      margin-bottom: 20px;
      font-size: 14px;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 14px;
    }
    th, td {
      border: 1px solid #d1d5db;
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
    }
    th {
      background: #f3f4f6;
    }
    .card {
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 12px 14px;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <h1>{{ report_title|e }}</h1>
  <div class="meta">Generated at {{ generated_at|e }}</div>
  {% block content %}{% endblock %}
</body>
</html>
