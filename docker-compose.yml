##################################################################
# SYRA LMS вЂ” Production Docker Compose
#
# Quick start:
#   1. cp backend/.env.docker.example backend/.env.docker
#   2. cp frontend/.env.production.example frontend/.env.production
#   3. docker compose up -d --build
#   4. Open http://localhost (or your domain)
#
# Optional local PostgreSQL:
#   Uncomment the "db" service below and set:
#     DATABASE_URL=postgresql+psycopg://syra:${POSTGRES_PASSWORD}@db:5432/syra_lms
##################################################################

services:
  # в”Ђв”Ђ Optional: local PostgreSQL в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Uncomment if you don't use an external database (Supabase, Neon, etc.)
  #
  # db:
  #   image: postgres:16-alpine
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_DB: syra_lms
  #     POSTGRES_USER: syra
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-strong-password}
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U syra -d syra_lms"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 10s
  #   networks:
  #     - internal
  #   # Do NOT expose 5432 externally in production

  # в”Ђв”Ђ Backend (FastAPI + Gunicorn) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    init: true
    restart: unless-stopped
    env_file:
      - backend/.env.docker
    environment:
      AUTO_APPLY_MIGRATIONS: "${AUTO_APPLY_MIGRATIONS:-false}"
      PROCTORING_INFERENCE_MODE: "remote"
      AI_INFERENCE_URL: "http://ai-inference:8081"
      PROCTORING_BATCH_ANALYSIS_ENABLED: "true"
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
    depends_on:
      ai-inference:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://127.0.0.1:8000/api/health" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    # Backend is only accessible via nginx вЂ” do NOT expose externally in production.
    ports:
      - "127.0.0.1:8000:8000"
    expose:
      - "8000"
    volumes:
      - backend-storage:/app/storage
    networks:
      - internal
    # Uncomment if using the local db service:
    # depends_on:
    #   db:
    #     condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ГўвЂќв‚¬ГўвЂќв‚¬ Redis for Celery broker/result backend ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: [ "redis-server", "--save", "", "--appendonly", "no" ]
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ГўвЂќв‚¬ГўвЂќв‚¬ Dedicated AI inference service ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
  ai-inference:
    build:
      context: .
      dockerfile: backend/Dockerfile
    init: true
    restart: unless-stopped
    env_file:
      - backend/.env.docker
    command: [ "uvicorn", "src.app.ai_inference.main:app", "--host", "0.0.0.0", "--port", "8081" ]
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://127.0.0.1:8081/ready" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 180s
    expose:
      - "8081"
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ГўвЂќв‚¬ГўвЂќв‚¬ Batch proctoring worker (Celery) ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
  ai-batch-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    init: true
    restart: unless-stopped
    env_file:
      - backend/.env.docker
    environment:
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      PROCTORING_BATCH_ANALYSIS_ENABLED: "true"
    command: [ "celery", "-A", "src.app.core.celery_app.celery_app", "worker", "--loglevel=info", "--queues=proctoring-batch", "--concurrency=1" ]
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      disable: true
    volumes:
      - backend-storage:/app/storage
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # в”Ђв”Ђ Frontend (Nginx + React SPA) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    init: true
    restart: unless-stopped
    env_file:
      - frontend/.env.production
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "8080:80"
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  backend-storage:
    # Docker-managed named volume. Data persists across rebuilds.
    # To use a host directory instead: docker compose down, then
    #   mkdir -p ./backend/storage && chown 1000:1000 ./backend/storage
    # and replace this block with:
    #   driver: local
    #   driver_opts: { type: none, o: bind, device: ./backend/storage }
    driver: local
  # Uncomment if using local PostgreSQL:
  # pgdata:
  #   driver: local

networks:
  internal:
    driver: bridge
