name: Deploy to VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Production VM
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GIT_USERNAME: ${{ secrets.GIT_USERNAME }}
          GIT_PASSWORD: ${{ secrets.GIT_PASSWORD }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_PASSWORD }}
          port: 22
          command_timeout: 30m
          envs: GIT_USERNAME,GIT_PASSWORD
          script: |
            set -e
            cd /opt/syra-testme

            echo ">>> Stopping existing services..."
            docker compose -f docker-compose.yml -f docker-compose.local-db.yml down || true

            echo ">>> Pulling latest code from main..."
            # The existing repo at /opt/syra-testme is corrupted by a bad URL.
            # We will clone fresh to a temp directory to guarantee it works.
            cd /opt
            rm -rf syra-testme-temp
            git clone "https://${GIT_USERNAME}:${GIT_PASSWORD}@github.com/Zedny-ComputerVision/syra-testme.git" syra-testme-temp
            
            echo ">>> Replacing old code..."
            # Make sure we don't delete the storage/ volumes inside the old directory
            rsync -a --exclude 'backend/storage' syra-testme-temp/ syra-testme/
            rm -rf syra-testme-temp
            
            cd /opt/syra-testme
            
            echo ">>> Running deploy script..."
            export SYRA_SEED_DEMO_DATA=0
            bash scripts/deploy-linux.sh

            echo ">>> Deployment complete!"
