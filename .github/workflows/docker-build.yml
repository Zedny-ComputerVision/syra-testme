name: Deploy to VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Production VM
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GIT_PASSWORD: ${{ secrets.GIT_PASSWORD }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_PASSWORD }}
          port: 22
          command_timeout: 30m
          envs: GIT_PASSWORD
          script: |
            set -e
            cd /opt/syra-testme

            echo ">>> Stopping existing services..."
            docker compose -f docker-compose.yml -f docker-compose.local-db.yml down || true

            echo ">>> Pulling repository directly on the server..."
            # Clean up the broken origin URL and replace with PAT
            git remote remove origin || true
            git remote add origin "https://${GIT_PASSWORD}@github.com/Zedny-ComputerVision/syra-testme.git"
            
            # Fetch and reset to guarantee it updates perfectly
            git fetch origin main
            git reset --hard origin/main
            
            # Remove PAT from URL for security
            git remote set-url origin "https://github.com/Zedny-ComputerVision/syra-testme.git"

            echo ">>> Running deploy script..."
            export SYRA_SEED_DEMO_DATA=0
            bash scripts/deploy-linux.sh

            echo ">>> Deployment complete!"
