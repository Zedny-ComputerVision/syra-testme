name: Deploy to VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Production VM
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GIT_USERNAME: ${{ secrets.GIT_USERNAME }}
          GIT_PASSWORD: ${{ secrets.GIT_PASSWORD }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_PASSWORD }}
          port: 22
          command_timeout: 30m
          envs: GIT_USERNAME,GIT_PASSWORD
          script: |
            set -e
            cd /opt/syra-testme

            echo ">>> Stopping existing services..."
            docker compose -f docker-compose.yml -f docker-compose.local-db.yml down || true

            echo ">>> Pulling latest code from main..."
            ASKPASS_SCRIPT=$(mktemp)
            chmod +x "$ASKPASS_SCRIPT"
            cat > "$ASKPASS_SCRIPT" << 'EOF'
            #!/bin/sh
            case "$1" in
              *Username*|*username*) echo "$GIT_USERNAME" ;;
              *Password*|*password*) echo "$GIT_PASSWORD" ;;
            esac
            EOF
            # Reset origin to the clean HTTPS URL first, in case it was left in a bad state
            git remote set-url origin "https://github.com/Zedny-ComputerVision/syra-testme.git"
            
            GIT_ASKPASS="$ASKPASS_SCRIPT" git fetch origin main
            rm -f "$ASKPASS_SCRIPT"
            git reset --hard origin/main

            echo ">>> Running deploy script..."
            export SYRA_SEED_DEMO_DATA=0
            bash scripts/deploy-linux.sh

            echo ">>> Deployment complete!"
