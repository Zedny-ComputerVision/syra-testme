name: Deploy to VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Production VM
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GIT_USERNAME: ${{ secrets.GIT_USERNAME }}
          GIT_PASSWORD: ${{ secrets.GIT_PASSWORD }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_PASSWORD }}
          port: 22
          command_timeout: 30m
          envs: GIT_USERNAME,GIT_PASSWORD
          script: |
            set -e
            cd /opt/syra-testme

            echo ">>> Stopping existing services..."
            docker compose -f docker-compose.yml -f docker-compose.local-db.yml down || true

            echo ">>> Pulling latest code from main..."
            # Forcefully wipe out the broken URL directly from the file system.
            # Git commands fail because Git tries to parse the broken URL first.
            sed -i 's|url = https://.*@github.com|url = https://github.com|g' .git/config || true
            
            git remote set-url origin "https://${GIT_PASSWORD}@github.com/Zedny-ComputerVision/syra-testme.git"
            
            git fetch origin main
            git reset --hard origin/main
            # Clean up the URL so the token isn't left in the .git/config on disk
            git remote set-url origin "https://github.com/Zedny-ComputerVision/syra-testme.git"

            echo ">>> Running deploy script..."
            export SYRA_SEED_DEMO_DATA=0
            bash scripts/deploy-linux.sh

            echo ">>> Deployment complete!"
