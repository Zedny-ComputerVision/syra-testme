name: Deploy to VM

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Production VM
    runs-on: ubuntu-latest

    steps:
      - name: Validate deploy secrets
        shell: bash
        env:
          SYRA_DATABASE_URL: ${{ secrets.SYRA_DATABASE_URL }}
          SYRA_DATABASE_MIGRATION_URL: ${{ secrets.SYRA_DATABASE_MIGRATION_URL }}
          SYRA_JWT_SECRET: ${{ secrets.SYRA_JWT_SECRET }}
        run: |
          set -Eeuo pipefail

          if [[ -z "${SYRA_DATABASE_URL}" ]]; then
            echo "::error title=Missing required deploy secret::SYRA_DATABASE_URL is not set. Add it as a repository secret or attach the correct GitHub Actions environment to this job."
            exit 1
          fi

          if [[ -z "${SYRA_DATABASE_MIGRATION_URL}" ]]; then
            echo "::warning title=Missing optional deploy secret::SYRA_DATABASE_MIGRATION_URL is not set. setup-linux.sh will derive it from SYRA_DATABASE_URL when possible."
          fi

          if [[ -z "${SYRA_JWT_SECRET}" ]]; then
            echo "::warning title=Missing optional deploy secret::SYRA_JWT_SECRET is not set. The deploy will reuse the JWT secret already persisted on the VM."
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_PASSWORD }}
          port: 22
          command_timeout: 2m
          script: |
            set -Eeuo pipefail
            cd /opt/syra-testme

            dump_deploy_diagnostics() {
              local exit_code=$?
              set +e
              echo ">>> Deployment failed (exit ${exit_code}). Collecting Docker diagnostics..."
              docker compose ps -a || true
              echo ">>> Backend logs"
              docker compose logs --tail 200 backend || true
              echo ">>> AI worker logs"
              docker compose logs --tail 120 ai-worker || true
              echo ">>> Batch worker logs"
              docker compose logs --tail 120 ai-batch-worker || true
              echo ">>> Redis logs"
              docker compose logs --tail 80 redis || true
              echo ">>> Frontend logs"
              docker compose logs --tail 80 frontend || true
              exit "$exit_code"
            }

            trap dump_deploy_diagnostics ERR

            echo ">>> Pulling repository directly on the server..."
            # Now that the repo is public, we only need the clean HTTPS URL
            git remote remove origin || true
            git remote add origin "https://github.com/Zedny-ComputerVision/syra-testme.git"
            
            # Fetch and reset
            git fetch origin main
            git reset --hard origin/main

            echo ">>> Seeding deployment env files from GitHub secrets..."
            python3 - <<'PY'
            import json
            from pathlib import Path

            repo_root = Path("/opt/syra-testme")
            targets = (
                repo_root / ".env",
                repo_root / "backend" / ".env.docker",
            )
            updates = {
                "DATABASE_URL": json.loads(r'''${{ toJSON(secrets.SYRA_DATABASE_URL) }}'''),
                "DATABASE_MIGRATION_URL": json.loads(r'''${{ toJSON(secrets.SYRA_DATABASE_MIGRATION_URL) }}'''),
                "JWT_SECRET": json.loads(r'''${{ toJSON(secrets.SYRA_JWT_SECRET) }}'''),
                "BREVO_API_KEY": json.loads(r'''${{ toJSON(secrets.SYRA_BREVO_API_KEY) }}'''),
                "BREVO_SENDER_EMAIL": json.loads(r'''${{ toJSON(secrets.SYRA_BREVO_SENDER_EMAIL) }}'''),
                "BREVO_SENDER_NAME": json.loads(r'''${{ toJSON(secrets.SYRA_BREVO_SENDER_NAME) }}'''),
            }

            def upsert_env(path: Path, values: dict[str, str]) -> None:
                lines = path.read_text(encoding="utf-8").splitlines() if path.exists() else []
                pending = {key: value for key, value in values.items() if value}
                if not pending:
                    return

                seen: set[str] = set()
                new_lines: list[str] = []
                for line in lines:
                    key, sep, _ = line.partition("=")
                    if sep and key in pending:
                        new_lines.append(f"{key}={pending[key]}")
                        seen.add(key)
                    else:
                        new_lines.append(line)

                for key, value in pending.items():
                    if key not in seen:
                        new_lines.append(f"{key}={value}")

                path.parent.mkdir(parents=True, exist_ok=True)
                path.write_text("\n".join(new_lines) + "\n", encoding="utf-8")

            for target in targets:
                upsert_env(target, updates)

            print(">>> Wrote secret overrides into .env and backend/.env.docker")
            PY

            echo ">>> Running deploy script..."
            export SYRA_SEED_DEMO_DATA=0
            export SYRA_FRONTEND_URL="https://testme.zedny.ai"
            export SYRA_BACKEND_URL="https://testme.zedny.ai/api"
            export SYRA_DB_MIGRATION_TIMEOUT_SECONDS=60
            export SYRA_BACKEND_HEALTH_TIMEOUT_SECONDS=15
            export SYRA_FRONTEND_HEALTH_TIMEOUT_SECONDS=10
            if ! command -v flock >/dev/null 2>&1; then
              echo "::error title=Missing required command::flock is required on the VM to serialize deploys."
              exit 1
            fi

            flock -n /tmp/syra-testme-deploy.lock bash scripts/deploy-linux.sh || {
              exit_code=$?
              if [[ "$exit_code" -eq 1 ]]; then
                echo "::error title=Deploy already in progress::Another deploy is currently running on the VM."
              fi
              exit "$exit_code"
            }

            trap - ERR
            echo ">>> Deployment complete!"
