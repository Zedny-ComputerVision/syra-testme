name: Deploy to VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Production VM
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GIT_USERNAME: ${{ secrets.GIT_USERNAME }}
          GIT_PASSWORD: ${{ secrets.GIT_PASSWORD }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_PASSWORD }}
          port: 22
          command_timeout: 30m
          envs: GIT_USERNAME,GIT_PASSWORD
          script: |
            set -e
            cd /opt/syra-testme

            echo ">>> Stopping existing services..."
            docker compose -f docker-compose.yml -f docker-compose.local-db.yml down || true

            echo ">>> Pulling latest code from main..."
            # The config file on the VM is corrupted and git commands fail when trying 
            # to read the remote URL. We will bypass the `origin` remote entirely.
            
            # Clean up working tree
            git reset --hard HEAD
            
            # Pull directly from the URL, bypassing any saved remotes
            git pull "https://${GIT_PASSWORD}@github.com/Zedny-ComputerVision/syra-testme.git" main
            
            echo ">>> Running deploy script..."
            export SYRA_SEED_DEMO_DATA=0
            bash scripts/deploy-linux.sh

            echo ">>> Deployment complete!"
