map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# ── Shared security headers snippet ────────────────
# nginx add_header in a nested location REPLACES all parent headers.
# We therefore must repeat security headers in every location that
# declares its own add_header.  This map is just documentation; the
# actual repetition happens via copy-paste below.
#
# Core security headers (repeated in every location block):
#   X-Frame-Options          SAMEORIGIN
#   X-Content-Type-Options   nosniff
#   Referrer-Policy          strict-origin-when-cross-origin
#   Strict-Transport-Security max-age=31536000; includeSubDomains
#   Permissions-Policy       camera=(self), microphone=(self), ...
#   Content-Security-Policy  default-src 'self'; ...

server {
    listen 80;
    server_name _;
    client_max_body_size ${NGINX_CLIENT_MAX_BODY_SIZE};

    root /usr/share/nginx/html;
    index index.html;

    # Hide server version
    server_tokens off;

    # ── Gzip compression ───────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_comp_level 4;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml font/woff2;

    # ── API reverse proxy ──────────────────────────
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;
        # Cache + security headers
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=(), payment=()" always;
    }

    # ── Static assets (Vite hashed filenames) ──────
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        try_files $uri =404;
    }

    # ── Favicon / robots / manifest ────────────────
    location ~* ^/(favicon\.ico|robots\.txt|manifest\.json|site\.webmanifest)$ {
        add_header Cache-Control "public, max-age=86400" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        try_files $uri =404;
    }

    # ── SPA index: never cache ─────────────────────
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.cloudflarestream.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.cloudflarestream.com https://cloudflareinsights.com; media-src 'self' blob: https://*.cloudflarestream.com; frame-ancestors 'self'" always;
    }

    # ── SPA catch-all ──────────────────────────────
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.cloudflarestream.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.cloudflarestream.com https://cloudflareinsights.com; media-src 'self' blob: https://*.cloudflarestream.com; frame-ancestors 'self'" always;
        try_files $uri $uri/ /index.html;
    }
}
